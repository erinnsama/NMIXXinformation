name: Scrape Threads Fan Support

on:
  schedule:
    # 每天台灣時間上午 10:00 (UTC 02:00) 自動跑
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 允許手動觸發（更新按鈕使用）

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: scraper

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          THREADS_USERNAME: ${{ secrets.THREADS_USERNAME }}
          THREADS_PASSWORD: ${{ secrets.THREADS_PASSWORD }}
        run: python scrape.py
        working-directory: scraper

      - name: Commit updated posts.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "chore: update fan support posts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
