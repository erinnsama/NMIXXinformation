<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 — NMIXX 應援資訊</title>
  <style>
    :root {
      --bg: #07070f;
      --card: #10101e;
      --border: #22223a;
      --purple: #b86ef5;
      --pink: #f06bf0;
      --cyan: #6ee8f5;
      --green: #4ade80;
      --red: #f05050;
      --text: #eeeeff;
      --muted: #8888aa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── lock screen ── */
    #lock {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .lock-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .lock-box h2 { font-size: 18px; margin-bottom: 6px; }
    .lock-box p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .lock-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 15px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 14px;
    }
    .lock-box input:focus { outline: none; border-color: var(--purple); }
    .lock-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .lock-error { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }

    /* ── admin panel ── */
    #panel { display: none; padding: 32px 20px; max-width: 900px; margin: 0 auto; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .admin-header h1 { font-size: 20px; }
    .admin-header span { font-size: 12px; color: var(--muted); }

    .back-link { font-size: 13px; color: var(--purple); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }

    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 120px;
    }
    .stat.pending-stat { border-color: rgba(240,107,240,.35); }
    .stat-num { font-size: 28px; font-weight: 800; color: var(--purple); }
    .stat.pending-stat .stat-num { color: var(--pink); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-label.pending-label { color: var(--pink); }
    .section-label.pending-label::after { background: rgba(240,107,240,.25); }

    .post-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 10px;
      transition: border-color .2s;
    }
    .post-row:hover { border-color: #333355; }
    .post-row.pending-row { border-color: rgba(240,107,240,.2); }
    .post-row.pending-row:hover { border-color: rgba(240,107,240,.5); }

    .post-info { flex: 1; min-width: 0; }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(184,110,245,.12);
      color: var(--purple);
    }
    .tag.community { background: rgba(110,232,245,.1); color: var(--cyan); }
    .tag.day-tag { background: rgba(240,107,240,.1); color: var(--pink); }
    .username { font-weight: 700; font-size: 14px; }
    .post-date { font-size: 11px; color: var(--muted); }

    .post-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-line;
      word-break: break-word;
      max-height: 72px;
      overflow: hidden;
    }

    .post-extra {
      margin-top: 6px;
      font-size: 12px;
      color: #5555aa;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-group { display: flex; gap: 8px; flex-shrink: 0; align-self: center; flex-direction: column; }

    .approve-btn {
      background: rgba(74,222,128,.1);
      border: 1px solid rgba(74,222,128,.35);
      color: var(--green);
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .approve-btn:hover { background: rgba(74,222,128,.22); border-color: var(--green); }

    .del-btn {
      background: rgba(240,80,80,.1);
      border: 1px solid rgba(240,80,80,.3);
      color: var(--red);
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .del-btn:hover { background: rgba(240,80,80,.22); border-color: var(--red); }

    .edit-btn {
      background: rgba(110,232,245,.08);
      border: 1px solid rgba(110,232,245,.3);
      color: var(--cyan);
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .edit-btn:hover { background: rgba(110,232,245,.18); border-color: var(--cyan); }

    /* ── Edit Modal ── */
    #edit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #edit-modal.open { display: flex; }
    .edit-modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .edit-modal-box h3 { font-size: 16px; margin-bottom: 20px; }
    .edit-field { margin-bottom: 14px; }
    .edit-field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
    .edit-field input, .edit-field textarea, .edit-field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .edit-field input:focus, .edit-field textarea:focus, .edit-field select:focus {
      outline: none; border-color: var(--purple);
    }
    .edit-field textarea { resize: vertical; }
    .edit-modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .edit-save-btn {
      flex: 1;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .edit-cancel-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .empty { text-align: center; color: var(--muted); padding: 28px; font-size: 14px; }
    .empty-pending {
      text-align: center;
      color: rgba(240,107,240,.5);
      padding: 24px;
      font-size: 13px;
      background: rgba(240,107,240,.04);
      border: 1px dashed rgba(240,107,240,.2);
      border-radius: 10px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Lock screen -->
<div id="lock">
  <div class="lock-box">
    <h2>🔒 後台管理</h2>
    <p>NMIXX 高雄場應援資訊站</p>
    <input type="password" id="pw-input" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">進入</button>
    <div class="lock-error" id="pw-error">密碼錯誤</div>
  </div>
</div>

<!-- Admin panel -->
<div id="panel">
  <div class="admin-header">
    <div>
      <h1>⚙️ 後台管理</h1>
      <span id="last-update-label">—</span>
    </div>
    <a href="/" class="back-link">← 回到首頁</a>
  </div>

  <div class="stats">
    <div class="stat pending-stat">
      <div class="stat-num" id="count-pending">0</div>
      <div class="stat-label">⏳ 待審核</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="count-all">0</div>
      <div class="stat-label">已發布</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="count-community">0</div>
      <div class="stat-label">手動更新</div>
    </div>
  </div>

  <!-- Pending queue -->
  <div class="section-label pending-label">⏳ 待審核投稿</div>
  <div id="pending-list"></div>

  <!-- Published posts -->
  <div class="section-label">✅ 已發布應援資訊</div>
  <div id="post-list"></div>
</div>

<!-- Edit Modal -->
<div id="edit-modal">
  <div class="edit-modal-box">
    <h3>✏️ 編輯貼文</h3>
    <div class="edit-field"><label>活動名稱</label><input id="ef-event_name"></div>
    <div class="edit-field"><label>應援物 🎁</label><input id="ef-support_items"></div>
    <div class="edit-field"><label>數量 📦</label><input id="ef-quantity"></div>
    <div class="edit-field"><label>應援條件 📋</label><textarea id="ef-conditions" rows="3"></textarea></div>
    <div class="edit-field"><label>發放時間 ⏰</label><input id="ef-distribution_time"></div>
    <div class="edit-field"><label>活動地點</label><input id="ef-location"></div>
    <div class="edit-field"><label>說明文字</label><textarea id="ef-text" rows="3"></textarea></div>
    <div class="edit-field"><label>原文連結</label><input id="ef-url"></div>
    <div class="edit-field">
      <label>演唱日期</label>
      <select id="ef-day">
        <option value="both">雙日（7/11 + 7/12）</option>
        <option value="day1">7/11 周六場</option>
        <option value="day2">7/12 周日場</option>
      </select>
    </div>
    <div class="edit-field">
      <label>活動類型</label>
      <select id="ef-venue_type">
        <option value="venue">🎤 演唱會現場</option>
        <option value="offsite">🏪 非現場</option>
      </select>
    </div>
    <div class="edit-modal-actions">
      <button class="edit-save-btn" id="edit-save-btn" onclick="saveEdit()">儲存</button>
      <button class="edit-cancel-btn" onclick="closeEdit()">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ADMIN_PW = 'nmixx2026';
  const SESSION_KEY = 'nmixx_admin_ok';

  function showPanel() {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadAll();
  }

  function unlock() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PW) {
      sessionStorage.setItem(SESSION_KEY, '1');
      showPanel();
    } else {
      const err = document.getElementById('pw-error');
      err.style.display = 'block';
      document.getElementById('pw-input').value = '';
      setTimeout(() => err.style.display = 'none', 2000);
    }
  }

  if (sessionStorage.getItem(SESSION_KEY) === '1') showPanel();

  let allPosts = [];
  let allPending = [];

  const DAY_LABEL = { both: '雙日', day1: '7/11 周六', day2: '7/12 周日' };

  async function loadAll() {
    await Promise.all([loadPending(), loadPosts()]);
  }

  async function loadPending() {
    try {
      const res = await fetch('/api/pending', { cache: 'no-store' });
      const data = await res.json();
      allPending = data.pending || [];
    } catch {
      allPending = [];
    }
    document.getElementById('count-pending').textContent = allPending.length;
    renderPending();
  }

  async function loadPosts() {
    const res = await fetch('/api/posts', { cache: 'no-store' });
    const data = await res.json();
    allPosts = data.posts || [];

    if (data.last_updated) {
      document.getElementById('last-update-label').textContent =
        '最後更新：' + new Date(data.last_updated).toLocaleString('zh-TW');
    }

    document.getElementById('count-all').textContent = allPosts.length;
    document.getElementById('count-community').textContent = allPosts.filter(p => p.source === 'community').length;
    renderList();
  }

  function renderPending() {
    const list = document.getElementById('pending-list');
    if (!allPending.length) {
      list.innerHTML = '<div class="empty-pending">目前沒有待審核的投稿 ✨</div>';
      return;
    }
    list.innerHTML = allPending.map((p, i) => `
      <div class="post-row pending-row" id="prow-${i}">
        <div class="post-info">
          <div class="post-meta">
            <span class="tag community">✍️ 投稿</span>
            ${p.day ? `<span class="tag day-tag">📅 ${DAY_LABEL[p.day] || p.day}</span>` : ''}
            ${p.venue_type ? `<span class="tag">${p.venue_type === 'offsite' ? '🏪非現場(有指定地點)' : '🎤演唱會現場'}</span>` : ''}
            <span class="username">@${esc(p.username || '—')}</span>
            <span class="post-date">${esc(p.date || '')}</span>
          </div>
          <div class="post-text">${esc(p.text || '').replace(/\n/g, '<br>')}</div>
          <div class="post-extra">
            ${p.location ? `<span>📍 ${esc(p.location)}</span>` : ''}
            ${p.url ? `<a href="${p.url}" target="_blank" style="color:#6e8ef5">🔗 原文</a>` : ''}
          </div>
        </div>
        <div class="btn-group">
          <button class="approve-btn" onclick="approvePost(${i})">✅ 核准</button>
          <button class="edit-btn" onclick="openEdit(${i},'pending')">✏️ 編輯</button>
          <button class="del-btn" onclick="rejectPost(${i})">✕ 拒絕</button>
        </div>
      </div>
    `).join('');
  }

  function renderList() {
    const list = document.getElementById('post-list');
    if (!allPosts.length) {
      list.innerHTML = '<div class="empty">目前沒有已發布的資料</div>';
      return;
    }
    list.innerHTML = allPosts.map((p, i) => `
      <div class="post-row" id="row-${i}">
        <div class="post-info">
          <div class="post-meta">
            <span class="tag ${p.source === 'community' ? 'community' : ''}">
              ${p.source === 'community' ? '✍️ 手動更新' : '🔍 Threads'}
            </span>
            ${p.day ? `<span class="tag day-tag">📅 ${DAY_LABEL[p.day] || p.day}</span>` : ''}
            <span class="username">@${esc(p.username || '—')}</span>
            <span class="post-date">${esc(p.date || '')}</span>
          </div>
          <div class="post-text">${esc(p.text || '').replace(/\n/g, '<br>')}</div>
          <div class="post-extra">
            ${p.location ? `<span>📍 ${esc(p.location)}</span>` : ''}
            ${p.url ? `<a href="${p.url}" target="_blank" style="color:#6e8ef5">🔗 原文</a>` : ''}
          </div>
        </div>
        <div class="btn-group">
          <button class="edit-btn" onclick="openEdit(${i},'posts')">✏️ 編輯</button>
          <button class="del-btn" onclick="deletePost(${i})">刪除</button>
        </div>
      </div>
    `).join('');
  }

  async function approvePost(i) {
    const post = allPending[i];
    if (!confirm(`核准「${post.event_name || post.username}」並公開發布？`)) return;

    try {
      const res = await fetch('/api/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: post.id }),
      });
      let data;
      try { data = await res.json(); } catch { data = {}; }
      if (data.success) {
        showToast('✅ 已核准並發布');
        await loadAll();
      } else {
        showToast('❌ 核准失敗 (HTTP ' + res.status + ')：' + (data.error || '請稍後再試'));
      }
    } catch (err) {
      showToast('❌ 連線錯誤：' + err.message);
    }
  }

  async function rejectPost(i) {
    const post = allPending[i];
    if (!confirm(`拒絕並刪除「${post.event_name || post.username}」的投稿？`)) return;

    const res = await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: post.id, target: 'pending' }),
    });
    const data = await res.json();
    if (data.success) {
      allPending.splice(i, 1);
      document.getElementById('count-pending').textContent = allPending.length;
      renderPending();
      showToast('🗑️ 已拒絕並刪除');
    } else {
      showToast('❌ 刪除失敗：' + (data.error || ''));
    }
  }

  async function deletePost(i) {
    const post = allPosts[i];
    if (!confirm(`確定刪除「${post.event_name || post.username}」這筆資料？`)) return;

    const res = await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: post.id }),
    });
    const data = await res.json();
    if (data.success) {
      allPosts.splice(i, 1);
      document.getElementById('count-all').textContent = allPosts.length;
      document.getElementById('count-community').textContent = allPosts.filter(p => p.source === 'community').length;
      renderList();
      showToast('✅ 已刪除');
    } else {
      showToast('❌ 刪除失敗：' + (data.error || ''));
    }
  }

  // ── Edit ──
  let editTarget = null; // { index, target }

  function openEdit(i, target) {
    const post = target === 'pending' ? allPending[i] : allPosts[i];
    if (!post) return;
    editTarget = { index: i, target, id: post.id };
    const fields = ['event_name','support_items','quantity','conditions','distribution_time','location','text','url','day','venue_type'];
    fields.forEach(f => {
      const el = document.getElementById('ef-' + f);
      if (!el) return;
      const v = String(post[f] ?? '');
      if (el.tagName === 'SELECT') {
        const idx = Array.from(el.options).findIndex(o => o.value === v);
        el.selectedIndex = idx >= 0 ? idx : 0;
      } else {
        el.value = v;
      }
    });
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('edit-modal').classList.remove('open');
    editTarget = null;
  }

  async function saveEdit() {
    if (!editTarget) return;
    const btn = document.getElementById('edit-save-btn');
    btn.textContent = '儲存中⋯';
    btn.disabled = true;

    const fields = ['event_name','support_items','quantity','conditions','distribution_time','location','text','url','day','venue_type'];
    const updates = {};
    fields.forEach(f => { updates[f] = document.getElementById('ef-' + f).value; });

    try {
      const res = await fetch('/api/edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: editTarget.id, target: editTarget.target, fields: updates }),
      });
      const data = await res.json();
      if (data.success) {
        showToast('✅ 已儲存');
        closeEdit();
        await loadAll();
      } else {
        showToast('❌ 儲存失敗：' + (data.error || ''));
      }
    } catch (err) {
      showToast('❌ 連線錯誤：' + err.message);
    } finally {
      btn.textContent = '儲存';
      btn.disabled = false;
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function esc(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
  }
</script>
</body>
</html>
